<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>AEGIS-V</title>
	<link rel="icon" type="image/png" sizes="any" href="/images/icon1.png?v=2" />
	<link rel="shortcut icon" href="/images/icon1.png?v=2" />
	<link rel="stylesheet" href="/css/main.css" />
	<!-- Leaflet for map display -->
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
</head>
<body>
	<main>
		<header class="topbar">
			<div class="brand">
				<img src="/images/icon1.png" alt="logo" class="logo-img" />
				<h1 class="logo">AEGIS-V</h1>
			</div>
			<div class="clock-wrap" aria-live="polite">
				<span class="clock-label">Local Time</span>
				<div id="clock" class="clock">--:--:--</div>
			</div>
		</header>

		<section class="display-wrap">
			<div class="display video-feed glass">
				<h2>Live Feed</h2>
				<div id="videoContainer" class="video-container">
					<img id="videoImage" src="" alt="live feed" class="video-image" />
					<p class="video-placeholder">Waiting for video feed</p>
				</div>
			</div>
			<aside class="panel glass">
				<h2>Detected Trash</h2>
				<div class="map-container">
					<div id="map" class="map"></div>
					<div class="pi-url-section">
						<label for="piUrlInput" class="pi-url-label">Pi URL:</label>
						<input type="text" id="piUrlInput" class="pi-url-input" placeholder="http://192.168.1.100:5000" />
						<div id="piStatus" class="pi-status" data-status="disconnected">⚫</div>
					</div>
					<div id="piError" class="pi-error" aria-live="polite"></div>
				</div>
				<div id="locationsList" class="locations-list"></div>
				<div class="robot-control">
					<button id="robotToggle" class="robot-button" data-state="off" disabled>
						<span class="robot-icon">🤖</span>
						<span class="robot-text">Robot: OFF</span>
					</button>
				</div>
			</aside>
		</section>
	</main>
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin="" async defer></script>
	<script src="/scripts/main.js" defer></script>
</body>
</html>
