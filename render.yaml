services:
  - type: web
    name: mhxii-server
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT
    envVars:
      - key: MONGO_URI
        value: "REPLACE_WITH_YOUR_MONGO_URI"
      - key: MONGO_DB
        value: "testdb"
