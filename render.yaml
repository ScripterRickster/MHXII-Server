services:
  - type: web
    name: mhxii-server
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT
    # Note: do NOT store secrets (like MONGO_URI) in the repo. Set them
    # in the Render dashboard: Dashboard → Your Service → Environment → Environment Variables
    envVars:
      - key: MONGO_DB
        value: "testdb"